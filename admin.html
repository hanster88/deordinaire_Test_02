<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>DE ORDINAIRE — ADMIN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --ink:#2b2a28; --bg:#f4f1ea; --card:#ffffff; --line:#e6e1d5;
    --accent:#c9b48a; --navy:#1F3864; --green:#4a7c59; --red:#a4442e;
    --ff:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:var(--ff);font-size:14px;line-height:1.6}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:13.5px;border:1px solid var(--line);border-radius:8px;padding:9px 12px;background:#fff;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ink)}

  .layout{display:flex;min-height:100vh}
  /* ---------- sidebar ---------- */
  aside{width:230px;background:#171512;color:#d8d2c4;padding:26px 0;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .slogo{padding:0 24px 22px;border-bottom:1px solid rgba(216,210,196,.12);margin-bottom:18px}
  .slogo .t{font-size:17px;letter-spacing:.28em;color:#efe9dd}
  .slogo .s{font-size:9.5px;letter-spacing:.3em;color:var(--accent);margin-top:4px}
  .snav{flex:1}
  .snav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:12px 24px;font-size:13.5px;color:#b6b0a2;transition:.25s;border-left:2px solid transparent}
  .snav button:hover{color:#efe9dd;background:rgba(201,180,138,.06)}
  .snav button.on{color:#efe9dd;background:rgba(201,180,138,.1);border-left-color:var(--accent)}
  .snav button.locked{opacity:.32;pointer-events:none}
  .snav .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5}
  .sfoot{padding:18px 24px 0;border-top:1px solid rgba(216,210,196,.12);font-size:11px;color:#7d786c}
  /* ---------- main ---------- */
  main{flex:1;padding:26px 32px 60px;min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
  .topbar h1{font-size:20px;font-weight:600;letter-spacing:.02em}
  .topbar .sub{font-size:12px;color:#8b8578;margin-top:2px}
  .roles{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 14px}
  .roles label{font-size:12px;color:#8b8578}
  .roles select{width:auto;padding:6px 10px;font-size:12.5px}
  .rolebadge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--navy);color:#fff;letter-spacing:.06em}
  .rolebadge.viewer{background:#8b8578}
  .rolebadge.op{background:var(--green)}

  .grid{display:grid;gap:18px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:2fr 1fr}
  @media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:0 4px 16px rgba(30,25,15,.04)}
  .card h3{font-size:13px;font-weight:600;letter-spacing:.04em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .card h3 .more{font-size:11px;color:#8b8578;font-weight:400}
  .kpi .v{font-size:26px;font-weight:700;letter-spacing:-.01em}
  .kpi .l{font-size:12px;color:#8b8578;margin-bottom:6px}
  .kpi .d{font-size:11.5px;margin-top:6px}
  .up{color:var(--green)} .down{color:var(--red)}
  canvas{width:100%;display:block}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-size:11px;letter-spacing:.08em;color:#8b8578;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
  td{padding:10px;border-bottom:1px solid #f0ece1;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#faf8f2}
  .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#eee;display:block}
  .bdg{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:20px;letter-spacing:.03em}
  .bdg.sale{background:#e8f0e9;color:var(--green)}
  .bdg.soldout{background:#f7e8e4;color:var(--red)}
  .bdg.hidden{background:#eeeae0;color:#8b8578}
  .bdg.on{background:#e8ecf5;color:var(--navy)}
  .bdg.off{background:#eeeae0;color:#8b8578}

  .toggle{position:relative;width:36px;height:20px;border-radius:20px;background:#d5cfc0;transition:.3s;flex-shrink:0}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.3s}
  .toggle.on{background:var(--green)}
  .toggle.on::after{left:18px}
  .toggle.dis{opacity:.4;pointer-events:none}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-size:12.5px;font-weight:500;border:1px solid var(--line);background:#fff;transition:.25s}
  .btn:hover{border-color:var(--ink)}
  .btn.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.pri:hover{opacity:.85}
  .btn.sm{padding:6px 11px;font-size:11.5px;border-radius:7px}
  .btn:disabled{opacity:.4;pointer-events:none}

  .toolrow{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .toolrow .filters{display:flex;gap:8px;flex-wrap:wrap}
  .toolrow input{width:220px}

  /* modal */
  .mwrap{position:fixed;inset:0;background:rgba(20,17,12,.5);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  .mwrap.open{display:flex}
  .modal{background:#fff;border-radius:16px;width:min(560px,94vw);max-height:90vh;overflow-y:auto;padding:28px}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between}
  .modal h2 button{font-size:18px;color:#8b8578}
  .modal label{display:block;font-size:11.5px;color:#8b8578;margin:14px 0 5px;font-weight:500}
  .mrow{display:flex;gap:12px}
  .mrow>div{flex:1}
  .mfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
  .imgdrop{border:1.5px dashed var(--line);border-radius:10px;padding:18px;text-align:center;color:#8b8578;font-size:12px;cursor:pointer;transition:.25s}
  .imgdrop:hover{border-color:var(--accent);color:var(--ink)}
  .imgdrop img{max-height:110px;border-radius:8px;margin-bottom:8px}

  /* banner slots */
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:1100px){.slots{grid-template-columns:repeat(2,1fr)}}
  .slot{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
  .slot .simg{height:120px;background-size:cover;background-position:center;position:relative}
  .slot .simg .stag{position:absolute;top:8px;left:8px;font-size:10px;background:rgba(20,17,12,.65);color:#fff;padding:3px 8px;border-radius:12px}
  .slot .sbody{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
  .slot .sname{font-size:12.5px;font-weight:500}
  .slot .sspec{font-size:10.5px;color:#8b8578}

  /* perm matrix */
  .perm td:first-child{font-weight:500}
  .perm input[type=checkbox]{width:16px;height:16px;accent-color:var(--navy)}

  /* preview popup */
  .pvwrap{position:fixed;inset:0;background:rgba(15,13,10,.72);z-index:120;display:none;align-items:center;justify-content:center}
  .pvwrap.open{display:flex}
  .pv{background:#171512;color:#efe9dd;width:min(400px,90vw);border-radius:4px;overflow:hidden;text-align:center}
  .pv .pimg{height:220px;background-size:cover;background-position:center}
  .pv .pbody{padding:26px 24px}
  .pv .pt{font-size:17px;letter-spacing:.14em;margin-bottom:8px}
  .pv .pd{font-size:12.5px;opacity:.7;margin-bottom:18px}
  .pv .pbtn{display:inline-block;border:1px solid var(--accent);color:var(--accent);font-size:11px;letter-spacing:.2em;padding:10px 28px}
  .pv .pclose{display:flex;justify-content:space-between;font-size:11px;padding:10px 14px;background:#0e0d0b;color:#8b8578}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:#171512;color:#efe9dd;padding:12px 28px;font-size:12.5px;border-radius:30px;z-index:200;opacity:0;transition:.4s}
  .toast.show{transform:translateX(-50%);opacity:1}
  .note{font-size:11px;color:#a39c8c;margin-top:10px}
  .empty{color:#a39c8c;font-size:12.5px;padding:20px 0;text-align:center}
</style>
</head>

/* ================= charts (no lib) ================= */
function drawLine(){
  const cv=document.getElementById('cLine');if(!cv)return;
  const dpr=window.devicePixelRatio||1;const W=cv.clientWidth,H=190;cv.width=W*dpr;cv.height=H*dpr;
  const x=cv.getContext('2d');x.scale(dpr,dpr);
  const max=Math.max(...VISITS)*1.15,pad=30,iw=(W-pad*2)/(DAYS.length-1);
  x.strokeStyle='#eee8da';x.lineWidth=1;
  for(let i=0;i<4;i++){const y=20+(H-50)/3*i;x.beginPath();x.moveTo(pad,y);x.lineTo(W-pad,y);x.stroke();}
  /* visits */
  x.strokeStyle='#1F3864';x.lineWidth=2;x.beginPath();
  VISITS.forEach((v,i)=>{const px=pad+iw*i,py=20+(H-50)*(1-v/max);i?x.lineTo(px,py):x.moveTo(px,py);});x.stroke();
  x.fillStyle='#1F3864';VISITS.forEach((v,i)=>{const px=pad+iw*i,py=20+(H-50)*(1-v/max);x.beginPath();x.arc(px,py,3,0,7);x.fill();});
  /* orders (scaled x20) */
  x.strokeStyle='#c9b48a';x.lineWidth=2;x.beginPath();
  ORDERS.forEach((v,i)=>{const px=pad+iw*i,py=20+(H-50)*(1-(v*20)/max);i?x.lineTo(px,py):x.moveTo(px,py);});x.stroke();
  x.fillStyle='#8b8578';x.font='10px Pretendard, sans-serif';x.textAlign='center';
  DAYS.forEach((d,i)=>x.fillText(d,pad+iw*i,H-8));
  x.textAlign='left';x.fillStyle='#1F3864';x.fillRect(pad,H-2,10,3);x.fillStyle='#8b8578';x.fillText('방문',pad+14,H+1);
  x.fillStyle='#c9b48a';x.fillRect(pad+50,H-2,10,3);x.fillStyle='#8b8578';x.fillText('주문(×20)',pad+64,H+1);
}
function drawDonut(){
  const cv=document.getElementById('cDonut');if(!cv)return;
  const dpr=window.devicePixelRatio||1;const W=cv.clientWidth,H=190;cv.width=W*dpr;cv.height=H*dpr;
  const x=cv.getContext('2d');x.scale(dpr,dpr);
  const cx=H/2,cy=H/2,r=H/2-18;
  const colors=['#1F3864','#c9b48a','#4a7c59','#8a8070','#d5cfc0'];
  let a=-Math.PI/2;
  CHANNELS.forEach(([n,v],i)=>{
    const a2=a+v/100*Math.PI*2;
    x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,a,a2);x.closePath();
    x.fillStyle=colors[i];x.fill();a=a2;
  });
  x.beginPath();x.arc(cx,cy,r*.58,0,7);x.fillStyle='#fff';x.fill();
  x.font='11px Pretendard, sans-serif';x.textAlign='left';
  CHANNELS.forEach(([n,v],i)=>{
    const ly=28+i*26;
    x.fillStyle=colors[i];x.fillRect(H+16,ly-8,10,10);
    x.fillStyle='#2b2a28';x.fillText(`${n}`,H+32,ly);
    x.fillStyle='#8b8578';x.fillText(`${v}%`,H+130,ly);
  });
}
function drawBar(){
  const cv=document.getElementById('cBar');if(!cv)return;
  const dpr=window.devicePixelRatio||1;const W=cv.clientWidth,H=190;cv.width=W*dpr;cv.height=H*dpr;
  const x=cv.getContext('2d');x.scale(dpr,dpr);
  const max=Math.max(...HOURLY)*1.1,pad=26,bw=(W-pad*2)/24;
  HOURLY.forEach((v,i)=>{
    const bh=(H-46)*(v/max);
    x.fillStyle=i>=18&&i<=20?'#1F3864':'#d9d1bf';
    x.fillRect(pad+bw*i+1,H-30-bh,bw-3,bh);
  });
  x.fillStyle='#8b8578';x.font='9.5px Pretendard, sans-serif';x.textAlign='center';
  [0,6,12,18,23].forEach(h=>x.fillText(h+'시',pad+bw*h+bw/2,H-12));
}

  const P={dash:pageDash,products:pageProducts,popups:pagePopups,banners:pageBanners,traffic:pageTraffic,members:pageMembers};

  requestAnimationFrame(()=>{drawLine();drawDonut();drawBar();});
}

render();
