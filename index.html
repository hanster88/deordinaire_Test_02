<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE ORDINAIRE — Nobody Likes Ordinary</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&display=swap">
<style>
  :root{
    --ink:#2b2a28; --paper:#f6f2ea; --line:rgba(43,42,40,.12);
    --dark:#0e0d0b; --accent:#c9b48a;
    --ease:cubic-bezier(.22,1,.36,1);
    --ff:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR','Hiragino Sans','Microsoft YaHei',sans-serif;
    --fftitle:'Ivy Mode','IvyMode','Ivy Mode Regular','Playfair Display','Pretendard Variable',Pretendard,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    --shadow:0 14px 34px rgba(20,15,8,.16);
    --shadow-dark:0 16px 40px rgba(0,0,0,.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  h1,h2,h3{font-weight:500}
  body{background:var(--dark);color:#efe9dd;font-family:var(--ff);font-weight:400;font-size:15px;line-height:1.7;overflow-x:hidden}
  .ft{font-family:var(--fftitle);font-weight:400}
  a{color:inherit;text-decoration:none;cursor:pointer}
  button{cursor:pointer;font-family:inherit;background:none;border:none;color:inherit}
  @media(pointer:fine){ body.customcursor, body.customcursor a, body.customcursor button{cursor:none} }

  /* ---------- sparkle cursor ---------- */
  #cur{position:fixed;top:0;left:0;width:26px;height:26px;z-index:400;pointer-events:none;transform:translate(-50%,-50%);transition:transform .35s var(--ease);color:var(--accent)}
  #cur svg{width:100%;height:100%;animation:spin 7s linear infinite}
  #cur.big{transform:translate(-50%,-50%) scale(1.8)}
  #cur.big svg{animation-duration:2.6s}
  @keyframes spin{to{transform:rotate(360deg)}}
  .trail{position:fixed;width:13px;height:13px;z-index:398;pointer-events:none;color:var(--accent);animation:tfade .85s var(--ease) forwards}
  @keyframes tfade{0%{opacity:.7;transform:translate(-50%,-50%) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(90deg)}}
  @media(pointer:coarse){#cur{display:none}}

  /* ---------- logo (외부 logo.svg 마스크 방식 — 웹서버 배포용) ---------- */
  .lgm{display:block;background:currentColor;-webkit-mask:url('logo.svg') center/contain no-repeat;mask:url('logo.svg') center/contain no-repeat;aspect-ratio:198.33/94.25}
  .lg-h{height:34px}
  .lg-hero{height:min(24vh,180px);margin:0 auto}

  #intro{position:fixed;inset:0;background:#0a0908;z-index:300;display:flex;align-items:center;justify-content:center;transition:opacity 1.1s var(--ease),visibility 1.1s}
  #intro.gone{opacity:0;visibility:hidden}
  #intro .lgm{height:110px;color:#efe9dd;opacity:0;animation:iin 1.8s var(--ease) .2s forwards}
  @keyframes iin{0%{opacity:0;transform:translateY(20px) scale(.96)}100%{opacity:1;transform:none}}

  header{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 4vw;transition:.5s}
  header.scrolled{background:rgba(12,11,9,.72);backdrop-filter:blur(14px)}
  body.lightmode header.scrolled{background:rgba(246,242,234,.8)}
  .hrow{display:flex;align-items:center;justify-content:space-between;height:76px}
  nav{display:flex;gap:26px;font-size:11.5px;letter-spacing:.2em;font-weight:400}
  nav a{position:relative;padding:4px 0;opacity:.72;transition:opacity .3s}
  nav a::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:currentColor;transition:width .45s var(--ease)}
  nav a:hover{opacity:1}
  nav a:hover::after{width:100%}
  .util{display:flex;gap:16px;align-items:center;font-size:11px;letter-spacing:.14em;font-weight:400}
  .langs{display:flex;border:1px solid rgba(150,145,135,.4)}
  .langs button{padding:5px 9px;font-size:10px;letter-spacing:.08em;opacity:.55;transition:.3s;font-weight:400}
  .langs button.on{opacity:1;background:rgba(201,180,138,.18);color:var(--accent)}

  /* ---------- snap home ---------- */
  #snap{height:100vh;overflow-y:auto;scroll-snap-type:y mandatory}
  #snap::-webkit-scrollbar{display:none}
  .panel{height:100vh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .pbg{position:absolute;inset:-8%;background-size:cover;background-position:center;animation:kb 24s ease-in-out infinite alternate}
  @keyframes kb{0%{transform:scale(1)}100%{transform:scale(1.08)}}
  .pshade{position:absolute;inset:0}
  .pinner{position:relative;z-index:2;text-align:center;padding:0 8vw;max-width:1100px}
  /* 예시 배경: AI 생성 이미지(달항아리 무드). 실촬영 교체 시 규격가이드 1번 참조 */
  .hero-bg{position:absolute;inset:-10%;background:
    linear-gradient(rgba(12,11,9,.42),rgba(12,11,9,.62)),
    url('https://d8j0ntlcm91z4.cloudfront.net/user_3EWgBXQoBnnPVTLIUWHPYa0Ejhp/hf_20260702_081116_73148d24-8bdc-4127-ad71-2c93abbbf146.png') center/cover no-repeat,
    linear-gradient(160deg,#0c0b09 0%,#1b1915 55%,#0e0d0b 100%);
    animation:drift 26s ease-in-out infinite alternate}
  @keyframes drift{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.1) translate(2%,-2%)}}
  .grain{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);background-size:3px 3px}
  .herologo{opacity:0;animation:up 1.5s var(--ease) 1.4s forwards;color:#efe9dd}
  .kicker{font-size:11.5px;letter-spacing:.55em;color:var(--accent);margin-top:30px;opacity:0;animation:up 1.2s var(--ease) 1.9s forwards}
  .hsub{margin-top:9vh;font-family:var(--fftitle);font-size:clamp(17px,1.9vw,27px);line-height:1.8;letter-spacing:.08em;color:rgba(239,233,221,.82);opacity:0;animation:up 1.4s var(--ease) 2.3s forwards;word-break:keep-all;text-wrap:balance}
  @keyframes up{0%{opacity:0;transform:translateY(34px)}100%{opacity:1;transform:none}}
  .cue{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:2;font-size:9.5px;letter-spacing:.4em;color:rgba(239,233,221,.5);opacity:0;animation:up 1s var(--ease) 2.8s forwards}
  .cue::after{content:"";display:block;width:1px;height:46px;background:linear-gradient(rgba(239,233,221,.6),transparent);margin:10px auto 0;animation:cueA 2s ease-in-out infinite}
  @keyframes cueA{0%,100%{transform:scaleY(.4);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}}
  .medianote{position:absolute;top:96px;right:4vw;z-index:2;font-size:10px;letter-spacing:.14em;color:rgba(239,233,221,.35);border:1px dashed rgba(239,233,221,.22);padding:7px 13px}
  .mani p{font-family:var(--fftitle);font-size:clamp(20px,2.5vw,33px);line-height:1.95;letter-spacing:.05em;color:rgba(239,233,221,.85);word-break:keep-all;text-wrap:balance}
  .mani .accent{color:var(--accent)}
  .mani small{display:block;margin-top:42px;font-size:11px;letter-spacing:.42em;color:rgba(239,233,221,.4)}
  .cpanel .no{font-size:11px;letter-spacing:.42em;color:var(--accent);margin-bottom:24px}
  .cpanel h2{font-family:var(--fftitle);font-size:clamp(38px,5.4vw,76px);letter-spacing:.1em;line-height:1.08;margin-bottom:20px}
  .cpanel .ds{font-size:14.5px;letter-spacing:.04em;opacity:.75;max-width:560px;margin:0 auto 38px;word-break:keep-all;text-wrap:balance}
  .cta{display:inline-flex;align-items:center;gap:14px;font-size:11px;letter-spacing:.32em;color:var(--accent);border:1px solid rgba(201,180,138,.5);padding:14px 38px;transition:.4s}
  .cta::after{content:"→";transition:transform .45s var(--ease)}
  .cta:hover{background:rgba(201,180,138,.12)}
  .cta:hover::after{transform:translateX(9px)}
  .rv{opacity:0;transform:translateY(46px);transition:opacity 1.05s var(--ease),transform 1.05s var(--ease)}
  .rv.vis{opacity:1;transform:none}
  .rv.d1{transition-delay:.12s}.rv.d2{transition-delay:.24s}.rv.d3{transition-delay:.36s}.rv.d4{transition-delay:.48s}

  /* ---------- dial ---------- */
  #dial{position:fixed;left:0;top:0;height:100vh;width:500px;z-index:60;pointer-events:none;opacity:0;transition:opacity .6s}
  #dial.show{opacity:1}
  #dial .arc{position:absolute;left:-340px;top:50%;width:560px;height:560px;margin-top:-280px;border:1px solid rgba(239,233,221,.16);border-radius:50%}
  #dialRot{position:absolute;left:-60px;top:50%;transition:transform .95s var(--ease)}
  .ditem{position:absolute;left:0;top:0;transform-origin:0 0}
  .ditem span{display:inline-block;font-family:var(--fftitle);font-size:19px;color:rgba(239,233,221,.28);letter-spacing:.06em;transition:font-size .8s var(--ease),color .8s}
  .ditem.on span{font-size:44px;color:#efe9dd}
  body.lightmode .ditem span{color:rgba(43,42,40,.3)}
  body.lightmode .ditem.on span{color:var(--ink)}
  body.lightmode #dial .arc{border-color:rgba(43,42,40,.14)}
  #dialdot{position:absolute;left:204px;top:50%;width:5px;height:5px;margin-top:-2px;border-radius:50%;background:var(--accent)}
  #diallabel{position:absolute;left:306px;top:50%;transform:translateY(-50%);height:42px;display:flex;flex-direction:column;justify-content:center;padding-left:16px;border-left:1px solid rgba(201,180,138,.35);width:170px}
  #diallabel .lt{font-size:11.5px;letter-spacing:.18em;font-weight:500;line-height:1.3;height:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #diallabel .ls{font-size:10px;letter-spacing:.05em;opacity:.5;line-height:1.6;height:16px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:1200px){#diallabel{display:none}}
  @media(max-width:880px){#dial{display:none}}

  /* ---------- pages ---------- */
  .page{min-height:100vh;animation:pagein 1s var(--ease)}
  @keyframes pagein{0%{opacity:0;transform:translateY(24px)}100%{opacity:1;transform:none}}
  .cathero{position:relative;height:62vh;min-height:420px;display:flex;align-items:flex-end;overflow:hidden}
  .cathero-bg{position:absolute;inset:-10%;background-size:cover;background-position:center;animation:kb 20s ease-in-out infinite alternate}
  .cathero-inner{position:relative;z-index:2;padding:0 6vw 7vh;max-width:960px}
  .bk{display:inline-block;font-size:10.5px;letter-spacing:.3em;margin-bottom:24px;opacity:.7;transition:.3s}
  .bk:hover{opacity:1}
  .cathero h1{font-family:var(--fftitle);font-size:clamp(36px,5.2vw,66px);letter-spacing:.1em;line-height:1.1}
  .cathero .mood{margin-top:16px;font-size:14px;opacity:.8;max-width:600px;word-break:keep-all}
  .catbody{padding:9vh 6vw 13vh}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:40px 28px}
  .pcard .im{position:relative;aspect-ratio:1/1;overflow:hidden;margin-bottom:18px;background:#fff;border-radius:16px;box-shadow:var(--shadow);transition:box-shadow .5s,transform .5s var(--ease)}
  .pcard:hover .im{transform:translateY(-5px);box-shadow:0 22px 46px rgba(20,15,8,.22)}
  body:not(.lightmode) .pcard .im{box-shadow:var(--shadow-dark)}
  .pcard .im img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform 1.3s var(--ease)}
  .pcard:hover .im img{transform:scale(1.06)}
  .pcard .bdg{position:absolute;top:12px;left:12px;font-size:9.5px;letter-spacing:.22em;padding:5px 10px;background:rgba(20,17,14,.6);color:#efe9dd;backdrop-filter:blur(4px);z-index:2;border-radius:20px}
  .pcard .nm{font-size:14px;margin-bottom:5px;font-weight:500}
  .pcard .pr{font-size:13px;opacity:.6}
  .coming{padding:15vh 6vw;text-align:center}
  .coming h2{font-family:var(--fftitle);font-size:clamp(26px,3.4vw,44px);letter-spacing:.14em;margin-bottom:22px}
  .coming p{opacity:.65;max-width:520px;margin:0 auto 40px;word-break:keep-all}
  .coming .ln{display:inline-block;border:1px solid currentColor;padding:13px 44px;font-size:11px;letter-spacing:.3em;transition:.35s}
  .coming .ln:hover{background:var(--ink);color:var(--paper)}

  .obsplit{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:9vh 6vw 13vh}
  .obtile{position:relative;height:56vh;min-height:380px;border-radius:18px;overflow:hidden;display:flex;align-items:flex-end;box-shadow:var(--shadow)}
  .obtile .tbg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 1.6s var(--ease)}
  .obtile:hover .tbg{transform:scale(1.06)}
  .obtile .tsh{position:absolute;inset:0;background:linear-gradient(185deg,rgba(10,9,8,.05) 30%,rgba(10,9,8,.72))}
  .obtile .ttx{position:relative;z-index:2;padding:34px;color:#f4efe6}
  .obtile .ttx .tt{font-family:var(--fftitle);font-size:clamp(22px,2.4vw,34px);letter-spacing:.1em;margin-bottom:8px}
  .obtile .ttx .td{font-size:13px;opacity:.8;word-break:keep-all;max-width:420px}
  .obtile .ttx .te{margin-top:16px;font-size:10.5px;letter-spacing:.3em;color:var(--accent)}
  @media(max-width:880px){.obsplit{grid-template-columns:1fr}}

  .gal{background:#100e0c;color:#efe9dd;min-height:100vh}
  .galhead{padding:18vh 6vw 8vh;text-align:center}
  .galhead h1{font-family:var(--fftitle);font-size:clamp(34px,4.6vw,60px);letter-spacing:.14em;margin-bottom:16px}
  .galhead p{opacity:.6;font-size:13.5px;word-break:keep-all}
  .rooms{padding:0 6vw 14vh;max-width:1150px;margin:0 auto}
  .room{display:flex;align-items:center;gap:4vw;border-top:1px solid rgba(239,233,221,.12);padding:40px 10px;transition:background .5s;cursor:pointer;position:relative}
  .room:last-child{border-bottom:1px solid rgba(239,233,221,.12)}
  .room:hover{background:rgba(201,180,138,.05)}
  .room .rno{font-family:var(--fftitle);font-size:15px;color:var(--accent);letter-spacing:.2em;min-width:60px}
  .room .rname{font-family:var(--fftitle);font-size:clamp(22px,2.6vw,36px);letter-spacing:.12em;flex:1}
  .room .rcraft{font-size:12px;letter-spacing:.18em;opacity:.55;min-width:130px}
  .room .rimg{width:92px;height:92px;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-dark);flex-shrink:0}
  .room .rimg img{width:100%;height:100%;object-fit:cover}
  .room .rgo{font-size:10.5px;letter-spacing:.3em;color:var(--accent)}
  @media(max-width:880px){.room{flex-wrap:wrap;gap:14px}.room .rcraft{min-width:0}}
  .arthead{padding:18vh 8vw 6vh;text-align:center;max-width:860px;margin:0 auto}
  .arthead .ano{font-family:var(--fftitle);color:var(--accent);letter-spacing:.3em;font-size:13px;margin-bottom:18px}
  .arthead h1{font-family:var(--fftitle);font-size:clamp(30px,4vw,54px);letter-spacing:.14em;margin-bottom:10px}
  .arthead .acraft{font-size:12px;letter-spacing:.3em;opacity:.55;margin-bottom:30px}
  .arthead .ast{font-family:var(--fftitle);font-size:clamp(15px,1.5vw,19px);line-height:2.1;opacity:.8;word-break:keep-all;text-wrap:balance}
  .artworks{padding:6vh 8vw 16vh;max-width:1150px;margin:0 auto}
  .artworks .wlab{font-size:11px;letter-spacing:.34em;opacity:.5;margin-bottom:40px;text-align:center}
  .wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:64px 40px}
  .wcap{text-align:center;margin-top:2px}
  .wcap .wn{font-size:14px;font-weight:500;margin-bottom:4px}
  .wcap .wp{font-size:12px;opacity:.55}

  .ddet{display:grid;grid-template-columns:1.05fr 1fr;gap:6vw;padding:16vh 6vw 6vh;align-items:start}
  .ddet .im{aspect-ratio:1/1;position:relative;overflow:hidden;background:#fff;position:sticky;top:110px;border-radius:18px;box-shadow:var(--shadow)}
  body:not(.lightmode) .ddet .im{box-shadow:var(--shadow-dark)}
  .ddet .im img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .ddet .ct{font-size:10.5px;letter-spacing:.4em;margin-bottom:18px;opacity:.6}
  .ddet h1{font-family:var(--fftitle);font-size:clamp(26px,2.9vw,40px);letter-spacing:.06em;line-height:1.3;margin-bottom:16px}
  .ddet .pr{font-size:19px;margin-bottom:30px;font-weight:500}
  .ddet .ds{font-size:14px;opacity:.75;line-height:2;margin-bottom:36px;max-width:480px;word-break:keep-all}
  .actions{display:flex;gap:12px;max-width:480px;margin-bottom:44px}
  .actions button{flex:1;padding:16px 0;font-size:11px;letter-spacing:.28em;border:1px solid currentColor;transition:.35s;border-radius:4px}
  .actions button:hover{background:var(--ink);color:var(--paper)}
  .actions button.pri{background:var(--ink);color:var(--paper)}
  .actions button.pri:hover{opacity:.82}
  .dsec{border-top:1px solid var(--line);padding:20px 0;max-width:480px}
  .dsec b{display:block;font-size:11px;letter-spacing:.22em;margin-bottom:10px;font-weight:600}
  .dsec div{font-size:13px;opacity:.7;line-height:1.9}
  .spec{display:flex;gap:16px;font-size:13px;padding:4px 0}
  .spec span:first-child{min-width:90px;opacity:.5}
  .rel{padding:4vh 6vw 14vh}
  .rel h3{font-size:13px;letter-spacing:.3em;margin-bottom:30px;opacity:.7}
  .rel .pgrid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}

  /* ---------- auth ---------- */
  .authwrap{position:fixed;inset:0;z-index:160;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:.5s var(--ease)}
  .authwrap.open{visibility:visible;opacity:1}
  .authdim{position:absolute;inset:0;background:rgba(8,7,6,.66);backdrop-filter:blur(6px)}
  .auth{position:relative;width:min(420px,92vw);background:var(--paper);color:var(--ink);padding:48px 44px 42px;transform:translateY(28px);transition:.55s var(--ease);max-height:92vh;overflow-y:auto;border-radius:12px}
  .authwrap.open .auth{transform:none}
  .auth .x{position:absolute;top:16px;right:20px;font-size:20px;opacity:.5;transition:.3s}
  .auth .x:hover{opacity:1}
  .auth .alogo{display:flex;justify-content:center;margin-bottom:10px}
  .auth .asub{text-align:center;font-size:10.5px;letter-spacing:.18em;color:rgba(43,42,40,.5);margin-bottom:26px}
  .atabs{display:flex;margin-bottom:26px;border-bottom:1px solid var(--line)}
  .atabs button{flex:1;padding:12px 0;font-size:11.5px;letter-spacing:.24em;color:rgba(43,42,40,.4);border-bottom:1px solid transparent;margin-bottom:-1px;transition:.3s}
  .atabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
  .auth label{display:block;font-size:10px;letter-spacing:.2em;color:rgba(43,42,40,.5);margin:15px 0 6px}
  .auth input{width:100%;border:1px solid var(--line);background:#fff;padding:13px 14px;font-size:13.5px;font-family:inherit;transition:.3s;border-radius:6px}
  .auth input:focus{outline:none;border-color:var(--ink)}
  .auth .sub{width:100%;margin-top:24px;padding:15px 0;background:var(--ink);color:var(--paper);font-size:11px;letter-spacing:.3em;transition:.3s;border-radius:6px}
  .auth .sub:hover{opacity:.85}
  .adiv{display:flex;align-items:center;gap:14px;margin:24px 0 15px;font-size:10px;letter-spacing:.24em;color:rgba(43,42,40,.4)}
  .adiv::before,.adiv::after{content:"";flex:1;height:1px;background:var(--line)}
  .sbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 0;font-size:12.5px;border:1px solid var(--line);background:#fff;margin-bottom:10px;transition:.3s;border-radius:6px}
  .sbtn:hover{border-color:rgba(43,42,40,.4)}
  .sbtn.kakao{background:#FEE500;border-color:#FEE500;color:#191919}
  .sbtn svg{width:17px;height:17px;flex-shrink:0}
  .aterms{margin-top:18px;font-size:10.5px;line-height:1.7;color:rgba(43,42,40,.42);text-align:center}

  footer{background:#0a0908;color:rgba(239,233,221,.45);padding:9vh 4vw 5vh;font-size:12px;letter-spacing:.04em}
  footer.hide{display:none}
  .fgrid{display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap;padding-bottom:5vh;border-bottom:1px solid rgba(239,233,221,.1);margin-bottom:3.5vh}
  .fgrid b{display:block;font-size:10.5px;letter-spacing:.3em;color:rgba(239,233,221,.75);margin-bottom:14px;font-weight:600}
  .fgrid a{display:block;margin-bottom:9px;opacity:.7;transition:.3s}
  .fgrid a:hover{opacity:1;color:var(--accent)}

let lang='kr',cart=0,route={page:'home'},activeSec=0,lastList={page:'home'};

const fmt=n=>'₩'+n.toLocaleString();
const pName=p=>p[lang]||p.kr;
const cDesc=c=>c[lang]||c.kr;
const cMood=c=>c['mood'+lang]||c.moodkr;

const aSt=a=>a['st'+lang]||a.stkr;
function setLang(l){lang=l;render();renderAuth();}
function go(page,arg){route={page,arg};window.scrollTo({top:0});render();}
function toastMsg(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('show'),2400);}
function addCart(){cart++;document.getElementById('cn').textContent=cart;toastMsg(t('added'));}

/* ================= dial ================= */
const STEP=20,RAD=280;
function dialSections(){return [{t:t('sec_intro'),s:t('sec_intro_s')},{t:t('sec_mani'),s:t('sec_mani_s')},...C.map(c=>({t:c.name,s:cMood(c)}))];}
function buildDial(){
  document.getElementById('dialRot').innerHTML=dialSections().map((s,i)=>`<div class="ditem" style="transform:rotate(${i*STEP}deg)"><span style="transform:translate(${RAD}px,-50%)">${String(i+1).padStart(2,'0')}</span></div>`).join('');
  updateDial();
}
function updateDial(){
  document.getElementById('dialRot').style.transform=`rotate(${-activeSec*STEP}deg)`;
  document.querySelectorAll('.ditem').forEach((el,i)=>el.classList.toggle('on',i===activeSec));
  const secs=dialSections();
  const lb=document.getElementById('diallabel');
  lb.querySelector('.lt').textContent=secs[activeSec].t;
  lb.querySelector('.ls').textContent=secs[activeSec].s;
}

/* ================= render ================= */
function staticI18n(){
  document.querySelectorAll('[data-i]').forEach(el=>el.textContent=t(el.dataset.i));
  document.getElementById('gnb').innerHTML=C.map(c=>`<a onclick="go('cat','${c.id}')">${c.name}</a>`).join('');
  document.getElementById('fcats').innerHTML=C.map(c=>`<a onclick="go('cat','${c.id}')">${c.name}</a>`).join('');
  document.getElementById('langs').innerHTML=LANGS.map(([k,l])=>`<button class="${lang===k?'on':''}" onclick="setLang('${k}')">${l}</button>`).join('');
}
function pcard(p,i){
  return `<div class="pcard rv d${(i%4)+1}" onclick="go('product',${p.id})">
    <div class="im">${p.bk?`<span class="bdg">${p.bk}</span>`:''}<img loading="lazy" src="${im(p.img)}" alt=""></div>
    <div class="nm">${pName(p)}</div>
    <div class="pr">${fmt(p.pr)}</div>
  </div>`;
}
function setMode(light){
  document.body.classList.toggle('lightmode',!!light);
  document.body.style.background=light?'var(--paper)':'#14110e';
  document.body.style.color=light?'var(--ink)':'#efe9dd';
}
function catHero(c){
  return `<div class="cathero">
    <div class="cathero-bg" style="${c.hero?`background-image:url('${imBig(c.hero)}')`:`background:${c.bg}`}"></div>
    <div class="pshade" style="background:${c.heroshade||c.shade}"></div>
    <div class="cathero-inner">
      <a class="bk" onclick="go('home')">${t('back')}</a>
      <h1>${c.name}</h1>
      <div class="mood">${cMood(c)} — ${cDesc(c)}</div>
    </div>
  </div>`;
}

/* ================= snap scroll ================= */
let snapIO=null,animBusy=false;
function easeInOutCubic(x){return x<.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}
function animateTo(el,target,dur,done){
  const start=el.scrollTop,diff=target-start,t0=performance.now();
  function step(now){
    const k=Math.min(1,(now-t0)/dur);
    el.scrollTop=start+diff*easeInOutCubic(k);
    if(k<1)requestAnimationFrame(step);else if(done)done();
  }
  requestAnimationFrame(step);
}
function bindSnap(){
  const snap=document.getElementById('snap');
  if(snapIO)snapIO.disconnect();
  snapIO=new IntersectionObserver(es=>{
    es.forEach(e=>{
      if(e.isIntersecting){
        activeSec=parseInt(e.target.dataset.sec);
        updateDial();
        e.target.querySelectorAll('.rv').forEach(el=>el.classList.add('vis'));
        document.getElementById('hd').classList.toggle('scrolled',activeSec>0);
      }
    });
  },{root:snap,threshold:.55});
  snap.querySelectorAll('.panel').forEach(s=>snapIO.observe(s));
  const N=snap.querySelectorAll('.panel').length;
  const goPanel=dir=>{
    if(animBusy)return;
    const next=Math.min(N-1,Math.max(0,activeSec+dir));
    if(next===activeSec)return;
    animBusy=true;
    animateTo(snap,next*snap.clientHeight,1050,()=>{animBusy=false;});
  };
  snap.addEventListener('wheel',e=>{
    e.preventDefault();
    if(Math.abs(e.deltaY)<8)return;
    goPanel(e.deltaY>0?1:-1);
  },{passive:false});
  document.onkeydown=e=>{
    if(e.key==='Escape')closeAuth();
    if(route.page!=='home')return;
    if(['ArrowDown','PageDown'].includes(e.key)){e.preventDefault();goPanel(1);}
    if(['ArrowUp','PageUp'].includes(e.key)){e.preventDefault();goPanel(-1);}
  };
}
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target);}}),{threshold:.12});
function observeReveals(){if(route.page!=='home')document.querySelectorAll('.rv:not(.vis)').forEach(el=>io.observe(el));}
window.addEventListener('scroll',()=>{if(route.page!=='home')document.getElementById('hd').classList.toggle('scrolled',window.scrollY>40);},{passive:true});

/* ================= sparkle cursor & trail ================= */
const cur=document.getElementById('cur');
cur.innerHTML=SPARK;
let lastTrail=0;
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  const now=performance.now();
  if(now-lastTrail>55){
    lastTrail=now;
    const tr=document.createElement('div');
    tr.className='trail';tr.innerHTML=SPARK;
    tr.style.left=e.clientX+'px';tr.style.top=e.clientY+'px';
    document.body.appendChild(tr);
    setTimeout(()=>tr.remove(),900);
  }
});
function bindCursorTargets(){
  document.querySelectorAll('a,button,.pcard,.obtile,.room').forEach(el=>{
    el.onmouseenter=()=>cur.classList.add('big');
    el.onmouseleave=()=>cur.classList.remove('big');
  });
}

/* ================= auth ================= */
let authMode='login';
function openAuth(mode){authMode=mode||'login';renderAuth();document.getElementById('authwrap').classList.add('open');}
function closeAuth(){document.getElementById('authwrap').classList.remove('open');}
function authTab(mode){authMode=mode;renderAuth();}
function renderAuth(){
  document.getElementById('tabLogin').classList.toggle('on',authMode==='login');
  document.getElementById('tabJoin').classList.toggle('on',authMode==='join');
  const f=document.getElementById('authFields');
  if(authMode==='login'){
    f.innerHTML=`<label>${t('a_email')}</label><input type="email" placeholder="you@example.com">
      <label>${t('a_pw')}</label><input type="password" placeholder="••••••••">`;
    document.getElementById('authSubmit').textContent=t('a_login_btn');
  }else{
    f.innerHTML=`<label>${t('a_name')}</label><input type="text">
      <label>${t('a_email')}</label><input type="email" placeholder="you@example.com">
      <label>${t('a_pw')}</label><input type="password" placeholder="••••••••">
      <label>${t('a_pw2')}</label><input type="password" placeholder="••••••••">`;
    document.getElementById('authSubmit').textContent=t('a_join_btn');
  }
  bindCursorTargets();
}
